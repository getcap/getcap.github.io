      <p>
        ⚠️仅限管理员使用
      </p>
      <p>
        ⚠️说明：适用于 “临时用户”，授权只有一天。
      </p>

      <div class="field label invalid border active">
        <input type="text" id="input1"  class="active">
        <label class="active">管理员密码</label>
      </div>

      <div class="field label border">
        <input type="text" id="input3"  class="active">
        <label  class="active">用户序列号</label>
      </div>

      <div class="field label border">
        <input type="text" id="input2"  class="active" >
        <label  class="active">用户码</label>
      </div>

      <div class="field label border">
        <select id="select1">
          <option value="5">5DLC</option>
          <option value="4">4DLC</option>
          <option value="3">3DLC</option>
          <option value="2">2DLC</option>
          <option value="1">1DLC</option> 
          <option value="0">0DLC</option>                   
        </select>
        <label>用户类型</label>
      </div>      

      <nav class="right-align">
        <button class="small-round" hx-on:click="calc(event)">
          <i>calculate</i>
          <span>计算</span>
        </button>

        <dialog class="top" id="dialog">
          <h5>提示</h5>
          <div>
            空白不能计算，请输入种子
          </div>
          <nav class="right-align">
            <button hx-on:click="document.querySelector('#dialog').close()">Confirm</button>
          </nav>
        </dialog>

        <div class="snackbar" id="snackbar1">

        </div>
